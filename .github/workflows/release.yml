name: Release to Play Store

# Cutting a release is a deliberate act: push an annotated tag like v0.1.2 and
# this builds a signed AAB and ships it to the production track.
#
#     git tag -a v0.1.2 -m "v0.1.2"
#     git push origin v0.1.2
#
# Requires the repo secrets documented in RELEASING.md:
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD,
#   PLAY_SERVICE_ACCOUNT_JSON

on:
  push:
    tags:
      - "v*"

# Never let two releases race to the same track.
concurrency:
  group: play-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for versionCode)
        uses: actions/checkout@v4
        with:
          # versionCode is the commit count — needs the whole history, not a
          # shallow clone.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag + history
        id: version
        run: |
          NAME="${GITHUB_REF_NAME#v}"          # v0.1.2 -> 0.1.2
          CODE="$(git rev-list --count HEAD)"   # monotonic, already > published 2
          echo "VERSION_NAME=$NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_ENV"
          echo "Releasing $NAME (versionCode $CODE)"

      - name: Restore upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
          cat > androidApp/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/upload.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Validate translations
        run: python3 tools/validate_translations.py

      - name: Build signed release bundle
        run: ./gradlew :androidApp:bundleRelease --no-daemon

      - name: Upload to Google Play (production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.offlineplaya.android
          releaseFiles: androidApp/build/outputs/bundle/release/androidApp-release.aab
          mappingFile: androidApp/build/outputs/mapping/release/mapping.txt
          debugSymbols: androidApp/build/outputs/native-debug-symbols/release/native-debug-symbols.zip
          track: production
          # Full rollout. For a staged rollout instead, comment `status` out
          # and set e.g.  status: inProgress  /  userFraction: 0.2
          status: completed

      - name: Keep the built bundle as a workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: androidApp/build/outputs/bundle/release/androidApp-release.aab
          if-no-files-found: warn
