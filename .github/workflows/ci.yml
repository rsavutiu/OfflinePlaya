name: CI

# Continuous checks on every PR and every push to main.
#
# Two tiers, deliberately split (see docs/instrumentation-test-plan.md):
#   * unit-tests       — fast, deterministic, BLOCKING. The merge gate.
#   * instrumented-tests — full on-device suite on an emulator, NON-BLOCKING
#     until it's been seen green a few times. The Compose-MP `runComposeUiTest`
#     host has screen-awake / foreground-focus sensitivities we've only verified
#     on physical hardware, so we don't wall off every merge on first-run
#     emulator flakiness.

on:
  pull_request:
  push:
    branches: [ main ]

# One in-flight run per ref; newer pushes supersede older ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests + compile (blocking gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate translations
        run: python3 tools/validate_translations.py

      - name: Shared unit tests + app compile
        run: |
          chmod +x ./gradlew
          ./gradlew :shared:testDebugUnitTest :androidApp:compileDebugKotlin --no-daemon

      - name: Upload unit-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: shared/build/reports/tests/
          if-no-files-found: ignore

  instrumented-tests:
    name: Instrumented tests (API 35 emulator, non-blocking)
    runs-on: ubuntu-latest
    # Informational until proven green on the emulator — does not fail the run.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # android-emulator-runner needs hardware acceleration; ubuntu runners
      # expose KVM but the device node isn't world-writable by default.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          # A fresh boot with animations off and the keyguard never shown is the
          # closest emulator analogue to the awake+unlocked+foregrounded state
          # the runComposeUiTest host needs.
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            chmod +x ./gradlew
            ./gradlew :androidApp:connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: androidApp/build/reports/androidTests/
          if-no-files-found: ignore
